# Redis configuration for AI Regulatory Compliance Monitor
# Optimized for local development and demo purposes

# Basic settings
port 6379
bind 0.0.0.0
protected-mode no

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence for demo data
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Performance optimizations for demo
tcp-keepalive 300
timeout 0

# Pub/Sub settings for real-time notifications
notify-keyspace-events Ex

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""